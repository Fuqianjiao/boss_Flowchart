<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f5f4ef;
    color: #1a1a18;
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  .page-header {
    max-width: 900px;
    margin: 0 auto 28px;
  }
  .page-header h1 {
    font-size: 20px;
    font-weight: 500;
    color: #1a1a18;
    margin-bottom: 6px;
  }
  .page-header p {
    font-size: 13px;
    color: #73726c;
    line-height: 1.6;
  }

  .card {
    max-width: 900px;
    margin: 0 auto;
    background: #ffffff;
    border: 0.5px solid #d3d1c7;
    border-radius: 14px;
    padding: 24px 28px 32px;
  }

  .tab-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    padding: 4px;
    background: #f1efe8;
    border-radius: 10px;
  }
  .tab-btn {
    flex: 1;
    padding: 9px 0;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #73726c;
    cursor: pointer;
    transition: all .2s;
    font-family: inherit;
  }
  .tab-btn:hover { color: #1a1a18; }
  .tab-btn.active {
    background: #ffffff;
    color: #1a1a18;
    border: 0.5px solid #d3d1c7;
  }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  svg { display: block; width: 100%; }

  .nav-btns {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
  }
  .nav-btn {
    font-size: 13px;
    padding: 8px 20px;
    cursor: pointer;
    color: #5f5e5a;
    background: #f1efe8;
    border: 0.5px solid #b4b2a9;
    border-radius: 8px;
    font-family: inherit;
    transition: all .15s;

  .nav-btn:hover { background: #e8e6df; color: #1a1a18; }

  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 24px;
    margin-top: 24px;
    padding: 12px 16px;
    background: #f1efe8;
    border-radius: 8px;
    border: 0.5px solid #d3d1c7;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: #5f5e5a;
  }
  .l-dot {
    width: 12px; height: 12px;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .l-line {
    width: 28px; height: 1.5px;
    background: #b4b2a9;
    background-image: repeating-linear-gradient(90deg,#b4b2a9 0,#b4b2a9 5px,transparent 5px,transparent 9px);

<script>
function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pane-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}
</script>
